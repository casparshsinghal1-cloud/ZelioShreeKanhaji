<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form - Zelio eBikes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .navbar h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .navbar p {
            color: #666;
            font-size: 16px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            display: none;
            font-weight: 600;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .google-form-section {
            display: flex;
            flex-direction: column;
        }
        
        .google-form-section iframe {
            border-radius: 5px;
            border: none;
            flex: 1;
            min-height: 600px;
        }
        
        .info-box {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .info-box p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .navbar h1 {
                font-size: 24px;
            }
            
            .section {
                padding: 20px;
            }
            
            .google-form-section iframe {
                min-height: 800px;
            }
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🚲 Zelio eBikes</h1>
        <p>Customer Inquiry Form</p>
    </div>
    
    <div class="container">
        <!-- Left Section: Custom Form -->
        <div class="section">
            <h2>Quick Contact Form</h2>
            
            <div class="info-box">
                <p>📋 Fill out the quick form below or use the Google Form on the right</p>
            </div>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required placeholder="Tell us about your inquiry..."></textarea>
                </div>
                
                <button type="submit">Submit</button>
                
                <div class="message" id="message"></div>
            </form>
        </div>
        
        <!-- Right Section: Google Form Embed -->
        <div class="section google-form-section">
            <h2>Google Form</h2>
            
            <div class="info-box">
                <p>📝 Or fill the embedded form below (recommended for direct spreadsheet sync)</p>
            </div>
            
            <!-- REPLACE THIS WITH YOUR GOOGLE FORM EMBED CODE -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdinRtFGgrChxHrUhwGDPgfST0bGNi7zOCqVgA66nsb3XvfkQ/viewform?usp=header" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0">Loading Google Form...</iframe>
            <!-- END REPLACEMENT -->
        </div>
    </div>
    
    <div class="footer">
        <p>© 2026 Zelio eBikes. All customer data is securely stored in Google Sheets.</p>
    </div>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = '✓ Thank you! Your entry has been received.';
            msgDiv.className = 'message success';
            
            document.getElementById('contactForm').reset();
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
